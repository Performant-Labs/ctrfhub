# PR-Agent configuration for CTRFHub
#
# Docs: https://qodo-merge-docs.qodo.ai/usage-guide/configuration_options/
# Model IDs: https://openrouter.ai/models  ← verify before first run; update model/fallback fields if names have drifted
#
# Default model: Kimi K2.6 Thinking via OpenRouter (~$0.02–$0.03 per 200-line PR, near-Opus-4.6 quality).
# Fallback: Opus 4.6 via OpenRouter (rate-limit / outage recovery).
# Override per-PR: add the `high-stakes` label to force Opus 4.6 primary (see .github/workflows/pr-review.yml).

[config]
# Model IDs verified against https://openrouter.ai/api/v1/models 2026-04-23
# Auth: OPENAI_API_KEY=<openrouter_key> + OPENAI_API_BASE=https://openrouter.ai/api/v1
# Model names use vendor/model format (no openrouter/ prefix needed with API base override).
model = "openrouter/moonshotai/kimi-k2-thinking"
fallback_models = ["openrouter/anthropic/claude-opus-4.6"]
verbosity_level = 1
# Don't truncate our skills/ context — reviews need the full spec context loaded
max_description_tokens = 1500
max_commits_tokens = 1500
# Both models are newer than PR-Agent's internal MAX_TOKENS table — set explicitly.
custom_model_max_tokens = 131072

[pr_reviewer]
require_score_review = true
require_tests_review = true
require_security_review = true
require_focused_review = false
num_code_suggestions = 4
inline_code_comments = true
automatic_review = true
persistent_comment = true
final_update_message = false
extra_instructions = """
You are the SPEC-ENFORCER AGENT for CTRFHub. Your job is drift detection, not code improvement.

MANDATORY CONTEXT — read before scoring:
1. CLAUDE.md at repo root — project overview, forbidden patterns, review priorities.
2. agents.md — the Spec-enforcer role definition. Follow it exactly.
3. Every file in skills/ — our conventions, each cites its source in docs/planning/.
4. docs/planning/*.md — authoritative spec. Do not suggest changes to these files.
5. docs/planning/tasks.md — identify which story this PR implements; check its declared test tiers and acceptance criteria.

PRIMARY JOB — spec drift detection:
1. Does the diff honor every applicable skill in skills/? For each violation, quote the skill filename and the rule it breaks.
2. Does the diff satisfy the story's acceptance criteria in docs/planning/tasks.md? Missing criteria = BLOCKING.
3. Are the declared test tiers (unit / integration / e2e) present in the diff? Missing required tests = BLOCKING.
4. For UI stories: are Tier 1 (Headless), Tier 2 (ARIA), and Tier 3 (Visual) assertions present per the story's declaration in docs/planning/tasks.md? Tier 3 present without Tier 2 = BLOCKING.
5. Any pattern in CLAUDE.md's "Forbidden patterns" list = BLOCKING. Always cite the triggering skill.

SECONDARY JOB — quality:
- Security issues (auth bypass, injection, unsafe deserialization, missing rate-limit, missing CSRF).
- Runtime regressions likely to slip past unit tests (race conditions, connection leaks, unbounded queries).

REVIEW STYLE:
- Distinguish BLOCKING (spec drift, forbidden pattern, missing required tests, security) from NIT (style, preference).
- Every BLOCKING finding MUST cite the skill file or spec section it derives from. No citation = downgrade to NIT.
- Do not suggest rewrites or alternative architectures. This repo follows the spec deliberately.
- If something in the diff is not covered by any skill or spec, say so explicitly and recommend the author flag it in docs/planning/gaps.md.
- When in doubt between blocking and nit, prefer nit — false positives erode trust in the reviewer.

OUTPUT SHAPE:
- Lead the review with a one-line verdict: BLOCKING / NITS / CLEAN.
- Then the sections PR-Agent normally produces.
- Inline comments should focus on the exact lines that violate a cited rule.
"""

[pr_code_suggestions]
num_code_suggestions = 4
summarize = true
extra_instructions = """
Only suggest code changes that bring the diff into compliance with skills/*.md or docs/planning/*.md.
Every suggestion must cite its source (skill filename or spec section).
Do not suggest refactors, renames, or alternative patterns that are not required by the spec.
"""

[pr_description]
publish_description_as_comment = false
add_original_user_description = true
keep_original_user_title = true
extra_instructions = """
If the PR description references a story ID from docs/planning/tasks.md, keep that reference prominent.
Append a one-line summary of the declared test tiers and whether each is present in the diff.
"""

[github]
publish_inline_comments = true
publish_output = true
publish_output_progress = false

[litellm]
# Let LiteLLM retry on transient failures before falling back
drop_params = true
# Needed for models not in LiteLLM's built-in token count table
max_model_len = 131072
