# CTRFHub -- Tugboat per-PR Preview Configuration (SQLite variant)
#
# This preview uses SQLite (not Postgres) because Tugboat's free tier
# (512 MB RAM total) cannot fit a PG container alongside the Node app
# within the 5-minute startup healthcheck window. Production is
# unaffected -- the app supports both dialects via MikroORM's
# dual-dialect config (skills/mikroorm-dual-dialect.md), and prod
# deployments still target PG via DATABASE_URL.
#
# Service:
#   app -- Node.js application with on-disk SQLite at /tmp/ctrfhub-preview.sqlite
#
# Build stages:
#   init   -- install OS packages and npm dependencies (cached across rebuilds)
#   update -- compile TypeScript + Tailwind CSS (re-runs on refresh)
#   build  -- start the app, run seed script, verify health
#
# Environment variables (set in Tugboat's Repository Settings, NOT here):
#   TUGBOAT_ADMIN_EMAIL    -- admin user email for the preview
#   TUGBOAT_ADMIN_PASSWORD -- admin user password (min 8 chars)
#   BETTER_AUTH_SECRET     -- 32+ char session signing key
#   SESSION_SECRET         -- 32+ char session secret (can match BETTER_AUTH_SECRET)
#
# Anti-patterns (per .argos/CI-003/brief.md):
#   - No hardcoded credentials in this file
#   - No separate "run migrations" step (schema-generator runs at app boot)
#   - No teardown script (Tugboat manages preview lifecycle)
#
# See: docs/planning/architecture.md --Production Deployment
# See: skills/better-auth-session-and-api-tokens.md
# See: skills/ctrf-ingest-validation.md
# See: skills/mikroorm-dual-dialect.md

services:
  # ---------------------------------------------------------------------------
  # app -- CTRFHub Node.js application (SQLite-backed for free-tier compatibility)
  # ---------------------------------------------------------------------------
  app:
    image: tugboatqa/node:22
    default: true
    expose: "3000"
    environment:
      # SQLITE_PATH triggers MikroORM's SQLite dialect (mikro-orm.config.ts
      # selects PG when DATABASE_URL is set, SQLite otherwise).
      SQLITE_PATH: /tmp/ctrfhub-preview.sqlite
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      # BETTER_AUTH_URL and PUBLIC_URL are derived from TUGBOAT_DEFAULT_SERVICE_URL
      # (a Tugboat runtime built-in, not a Repository-Settings env var). Tugboat's
      # YAML interpolation only handles repo-settings refs here, so these are
      # exported in the update-stage shell command (below) instead.
      PORT: "3000"
      NODE_ENV: production
      LOG_LEVEL: info

    commands:
      # ------ init: system packages + npm install (cached, skipped on refresh) ------
      init:
        # Native build toolchain for better-sqlite3 compilation + wget for healthchecks
        # tugboatqa/node:22 is debian-based; use apt-get instead of apk.
        - apt-get update
        - apt-get install -y --no-install-recommends python3 make g++ wget
        # Install all dependencies (including devDeps needed for tsc + tailwind build).
        # --include=dev is required because the env block sets NODE_ENV=production,
        # which would otherwise cause npm ci to skip devDeps. We need them at install
        # time for tsc / @tailwindcss/cli (npm run build) AND for husky's prepare
        # lifecycle hook to find the husky binary.
        - npm ci --include=dev

      # ------ update: compile + start app (re-runs on PR code changes / refresh) ------
      update:
        # Compile TypeScript --- dist/ and build Tailwind CSS --- dist/assets/
        - npm run build
        # Start the app in the background AND wait for /health in a single shell
        # block. We use `setsid -f` to start node in a NEW session, fully
        # detached from this shell -- without that, when this shell block
        # exits at the end of `update`, the kernel sends SIGHUP to all of
        # its children (including backgrounded ones) and node dies. That's
        # what was happening pre-2026-04-27: the build's seed.sh would run
        # successfully (because node was alive during build), then node
        # died the instant `update`'s shell exited. The preview's URL has
        # been broken from minute one of every preview's life, but we only
        # noticed because Tugboat suspends idle previews and the URL
        # 404'd as Tugboat's "Preview Not Found" splash.
        #
        # `setsid -f` (--fork) starts node in a brand-new session leader
        # with no controlling terminal -- SIGHUP can't reach it from any
        # shell exit. Output goes to /tmp/app.log so we can dump it if
        # startup fails. We then capture the pid via pgrep (since $! after
        # setsid -f gives us the setsid wrapper, not node).
        - |
          export BETTER_AUTH_URL="$TUGBOAT_DEFAULT_SERVICE_URL"
          export PUBLIC_URL="$TUGBOAT_DEFAULT_SERVICE_URL"
          # Stop any stale node from a previous update (rebuild scenario).
          pkill -f "node dist/index.js" 2>/dev/null || true
          sleep 1
          setsid -f node dist/index.js > /tmp/app.log 2>&1
          sleep 1
          APP_PID=$(pgrep -f "node dist/index.js" || true)
          echo "--- App started (PID $APP_PID); waiting for /health..."
          for i in $(seq 1 30); do
            STATUS=$(wget -qO- http://localhost:3000/health 2>/dev/null | grep -o '"status":"ok"' || true)
            if [ -n "$STATUS" ]; then
              echo "--- App is healthy"
              break
            fi
            if [ -n "$APP_PID" ] && ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "--- App process exited unexpectedly. /tmp/app.log:"
              tail -100 /tmp/app.log 2>/dev/null || echo "(no log captured)"
              exit 1
            fi
            echo "--- Waiting for app... attempt $i/30"
            sleep 2
          done
          if [ -z "$STATUS" ]; then
            echo "--- App did not become healthy within 60s. /tmp/app.log:"
            tail -100 /tmp/app.log 2>/dev/null || echo "(no log captured)"
            exit 1
          fi

      # ------ build: seed data + final verification (runs on every build) ------
      build:
        # Run the idempotent seed script to create admin, org, project, and API key.
        - bash "${TUGBOAT_ROOT}/.tugboat/seed.sh"
        # Final health verification
        - wget -qO- http://localhost:3000/health

      # ------ online: idempotently (re)start node when the preview comes online ------
      #
      # Why this exists: Tugboat free tier auto-suspends idle previews. On
      # wake, ONLY the `online` stage runs -- not init/update/build. Without
      # this stage, the woken container has no node process bound to :3000,
      # and Tugboat's edge returns its "Preview Not Found" splash page even
      # though the control plane reports the preview as "ready".
      #
      # Observed on PR #56 / main preview after free-tier idle suspend
      # (2026-04-27): netstat showed nothing on :3000, container fs intact,
      # but the URL 404'd until a manual `tugboat redeploy`.
      #
      # The pgrep guard makes this safe on both code paths:
      #  - first build: `update` already started node, online sees it, no-op.
      #  - suspend/wake: container resumes with no node, online starts it.
      #  - refresh: `update` rebuilds + restarts node, online sees the fresh
      #    process, no-op.
      online:
        - |
          if pgrep -f "node dist/index.js" > /dev/null; then
            echo "--- App already running (pid $(pgrep -f 'node dist/index.js')), skipping start"
            exit 0
          fi
          # Tugboat sets TUGBOAT_DEFAULT_SERVICE_URL in the runtime env on
          # every container start, so this is safe across wakes.
          export BETTER_AUTH_URL="$TUGBOAT_DEFAULT_SERVICE_URL"
          export PUBLIC_URL="$TUGBOAT_DEFAULT_SERVICE_URL"
          echo "--- Starting node from online stage (post-wake or fresh container)..."
          # setsid -f detaches node from this shell session so it survives
          # the shell exiting (no SIGHUP). See the note in `update` above.
          setsid -f node dist/index.js > /tmp/app.log 2>&1
          sleep 1
          APP_PID=$(pgrep -f "node dist/index.js" || true)
          for i in $(seq 1 30); do
            STATUS=$(wget -qO- http://localhost:3000/health 2>/dev/null | grep -o '"status":"ok"' || true)
            if [ -n "$STATUS" ]; then
              echo "--- App healthy (pid $APP_PID)"
              exit 0
            fi
            if [ -n "$APP_PID" ] && ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "--- App process exited unexpectedly. /tmp/app.log:"
              tail -100 /tmp/app.log 2>/dev/null || echo "(no log captured)"
              exit 1
            fi
            echo "--- Waiting for app... attempt $i/30"
            sleep 2
          done
          echo "--- App did not become healthy within 60s. /tmp/app.log:"
          tail -100 /tmp/app.log 2>/dev/null || echo "(no log captured)"
          exit 1
