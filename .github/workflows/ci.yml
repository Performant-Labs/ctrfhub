# CTRFHub -- Per-PR CI Pipeline
#
# Jobs (in order):
#   changes    -> dorny/paths-filter, decides which downstream jobs run
#   lint       -> tsc --noEmit + ESLint + Tugboat config sanity (always runs)
#   unit       -> Vitest unit tests (only when source/tests/deps changed)
#   integration-> Vitest integration tests (gated on unit + paths)
#   e2e        -> Playwright E2E (gated on integration + paths)
#
# Path filtering rationale:
# Config-only PRs (.tugboat/**, docs/**, .argos/**, *.md) skip the test
# jobs because the TypeScript codebase didn't change. Lint always runs
# because it owns the .tugboat/config.yml ASCII + image-allowlist check.
# Pushes to main always run the full pipeline (post-merge verification).
#
# node_modules cache: shared across jobs via actions/cache, keyed on
# (OS, node version, package-lock.json hash). Cache hit -> skip npm ci,
# saving ~25-40s per job on warm runs.
#
# Self-hosted runners are FORBIDDEN (cleanup/strip-self-hosted-runner-vestige).
# All jobs run on GitHub-hosted ubuntu-latest.

name: CI

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  push:
    branches:
      - main

# Cancel in-progress CI runs when a newer commit is pushed to the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # changes -- detect which file groups changed in this PR
  # Drives the if: gates on the test jobs below. ~10s job, no install needed.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'e2e/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'eslint.config.*'
              - '.github/workflows/ci.yml'

  # ---------------------------------------------------------------------------
  # lint -- always runs (covers .tugboat/config.yml sanity + ESLint + tsc)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: TypeScript typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --ext .ts

      - name: Tugboat config sanity
        run: |
          # 1. Pure ASCII -- Tugboat's YAML parser strips high bits and chokes
          #    on multibyte UTF-8 (em-dashes, box drawings, arrows, emojis).
          #    See PRs #38, #39 for prior history.
          if LC_ALL=C grep -nP '[^\x00-\x7F]' .tugboat/config.yml; then
            echo "::error file=.tugboat/config.yml::Non-ASCII bytes found in .tugboat/config.yml. Tugboat's YAML parser strips high bits, mangling multibyte UTF-8. Use ASCII-only in this file."
            exit 1
          fi
          # 2. Image registry allowlist -- Docker Hub's official postgres requires a
          #    Docker volume that's only on Tugboat Premium. Use tugboatqa/* curated
          #    images instead. See PR #40 for prior history.
          # Strict: only tugboatqa/* curated images are free-tier-friendly. Bare
          # node:* / postgres:* etc. either require Docker Volumes (PG) or fail
          # silently with Tugboat Error 1064 (node:22-alpine), so they are not
          # allowed here. See PR history: #38, #39, #40, and the chore swapping
          # node:22-alpine -> tugboatqa/node:22.
          BAD=$(grep -E '^[[:space:]]+image:' .tugboat/config.yml | grep -vE 'tugboatqa/' || true)
          if [ -n "$BAD" ]; then
            echo "::error file=.tugboat/config.yml::Image not on free-tier allowlist. Use tugboatqa/* or node:* only."
            echo "$BAD"
            exit 1
          fi
          echo "Tugboat config sanity passed."

  # ---------------------------------------------------------------------------
  # unit -- runs only when source/tests/deps changed (or on push to main)
  # ---------------------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.src == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # integration -- SQLite in-memory; gated on unit + paths
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, unit]
    if: github.event_name == 'push' || needs.changes.outputs.src == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run integration tests
        run: npm run test:int
        env:
          BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production-32ch
          NODE_ENV: test

  # ---------------------------------------------------------------------------
  # e2e -- Playwright + real Postgres; gated on integration + paths
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, integration]
    if: github.event_name == 'push' || needs.changes.outputs.src == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ctrfhub
          POSTGRES_PASSWORD: ctrfhub
          POSTGRES_DB: ctrfhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ctrfhub:ctrfhub@localhost:5432/ctrfhub
      BETTER_AUTH_SECRET: ci-e2e-secret-do-not-use-in-production-32chars
      BETTER_AUTH_URL: http://localhost:3000
      PORT: 3000
      NODE_ENV: test
      CTRFHUB_E2E_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium

      - name: Build application (tsc + Tailwind CSS)
        run: npm run build

      - name: Start application (background)
        run: node dist/index.js &

      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -sf http://localhost:3000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app... attempt $i/20 (status: ${STATUS:-unknown})"
            sleep 1
          done
          echo "App did not become healthy within 20s"
          exit 1

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        continue-on-error: false

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload E2E CTRF report (always -- for dog-food ingest)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ctrf-report
          path: e2e/ctrf/report.json
          retention-days: 30

      # Dog-food rule: POST the CTRF report to the Tugboat preview.
      # `continue-on-error: true` -- preview outages must not block PR merges.
      - name: Ingest E2E CTRF report into CTRFHub preview (dog-food)
        if: always() && vars.CTRFHUB_PREVIEW_URL != ''
        continue-on-error: true
        run: |
          if [ ! -f e2e/ctrf/report.json ]; then
            echo "No CTRF report found -- skipping ingest (tests may have been skipped)"
            exit 0
          fi
          curl -sf -X POST \
            "${{ vars.CTRFHUB_PREVIEW_URL }}/api/v1/projects/sample/runs" \
            -H "x-api-token: ${{ secrets.CTRFHUB_PREVIEW_API_KEY }}" \
            -H "content-type: application/json" \
            -d @e2e/ctrf/report.json
          echo "CTRF report ingested successfully"
