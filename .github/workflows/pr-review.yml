name: PR-Agent Spec Review

on:
  pull_request:
    # synchronize re-runs the review on every push to an open PR. Combined
    # with `concurrency.cancel-in-progress: true` below, rapid sequential
    # pushes cancel earlier runs before they bill. `persistent_comment = true`
    # in .pr_agent.toml means the review comment is updated in place rather
    # than duplicated on every run.
    types: [opened, reopened, ready_for_review, synchronize]
    # Skip the workflow entirely when ALL changed files match these patterns.
    # GitHub Actions semantics: a PR triggers the workflow only if at least
    # one changed file does NOT match paths-ignore. So docs-only / scratchpad-
    # only PRs (e.g., committing .argos/ coordination history, README typos,
    # planning-doc tweaks) skip pr-agent entirely — saving ~3-8 min wall time
    # for PRs where the model has nothing useful to say. Mixed PRs (docs +
    # any code or config) still trigger normally.
    #
    # Manual /review via PR comment ALWAYS works — issue_comment events below
    # are not affected by paths-ignore.
    paths-ignore:
      - '.argos/**'
      - 'docs/**'
      - 'skills/**'
      - '**/*.md'
      - '.gitignore'
      - '.nvmrc'
      - '.vscode/**'
      - '.idea/**'
  issue_comment:
    types: [created]   # enables /review, /describe, /improve slash commands

# Minimum scopes the action needs: read code, write PR comments & reviews.
permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number }}
  # Cancel in-flight reviews when a newer commit lands — no point reviewing stale code.
  cancel-in-progress: true

env:
  # Opt into Node.js 24 now — Node 20 actions deprecated, forced June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  pr-agent:
    # Skip bot-authored events, and skip drafts unless someone triggered a slash command.
    if: |
      github.event.sender.type != 'Bot' &&
      (!github.event.pull_request.draft || github.event.issue.pull_request)
    runs-on: ubuntu-latest
    # 20 min ceiling: 15 min was tight even after PR #8 + PR #9 cuts. The
    # extra 5 min is a safety margin for transient model-provider latency,
    # not a license for bigger PRs. If a review consumes >15 min steadily,
    # investigate (over-large diff, model regression) instead of bumping
    # this further.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # qodo-ai/pr-agent is pinned to a specific commit SHA rather than
      # `@main` so a silent upstream perf regression (or behavior change)
      # can't change CTRFHub's review behavior overnight. Bump intentionally
      # by:
      #   1. `gh api repos/qodo-ai/pr-agent/commits/main -q '.sha'`
      #   2. update both `uses:` lines below (default + high-stakes)
      #   3. open a PR; PR-Agent reviews itself with the new SHA
      #   4. compare median wall-time / output quality before merge
      # SHA captured 2026-04-25 — qodo-ai/pr-agent main HEAD.
      - name: PR-Agent review (default model — Kimi K2.6 Thinking via OpenRouter)
        id: review-default
        # If the PR is labelled `high-stakes`, skip this step — the high-stakes step below handles it with Opus 4.6.
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'high-stakes') }}
        uses: qodo-ai/pr-agent@0e37fc84fcc8207561e64eef8f7f634fb57e8447  # was @main
        env:
          # OPENROUTER__KEY (double underscore) maps to OPENROUTER.KEY in PR-Agent's Dynaconf
          # settings, which is the only path that correctly wires litellm.api_key before the call.
          # Using OPENROUTER_API_KEY alone sends DUMMY_LITELLM_API_KEY as the Bearer token.
          OPENROUTER__KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PR-Agent review — high-stakes (Opus 4.6)
        id: review-highstakes
        # Triggered when the `high-stakes` label is present.
        if: ${{ contains(github.event.pull_request.labels.*.name, 'high-stakes') }}
        uses: qodo-ai/pr-agent@0e37fc84fcc8207561e64eef8f7f634fb57e8447  # was @main
        env:
          OPENROUTER__KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG.MODEL: "openrouter/anthropic/claude-opus-4.6"
          CONFIG.FALLBACK_MODELS: '["openrouter/moonshotai/kimi-k2.6"]'

      - name: Apply score-bracket label from PR-Agent review
        # Parses the most recent PR-Agent comment for its Score field and
        # applies one of four bracket labels: score-90+, score-80-89,
        # score-70-79, score-below-70. Bracket (not exact) so we don't end
        # up with 100 distinct label values cluttering gh-dash filters.
        # The label appears in the PR header right under the title -- fastest
        # signal for "is this PR ready to merge?" before opening the diff.
        if: always() && (steps.review-default.outcome == 'success' || steps.review-highstakes.outcome == 'success')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
          if [[ -z "$PR_NUM" || "$PR_NUM" == "null" ]]; then
            echo "No PR number -- skipping label step"
            exit 0
          fi

          # Ensure the four bracket labels exist (idempotent -- ignore "already exists" errors).
          gh label create 'score-90+' --color '0e8a16' --description 'PR-Agent score 90-100 (ship)' --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create 'score-80-89' --color 'fbca04' --description 'PR-Agent score 80-89 (review carefully)' --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create 'score-70-79' --color 'e99695' --description 'PR-Agent score 70-79 (address suggestions)' --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create 'score-below-70' --color 'b60205' --description 'PR-Agent score <70 (probable blocking issues)' --repo "${{ github.repository }}" 2>/dev/null || true

          # Pull the most recent PR-Agent (github-actions[bot]) comment.
          # PR-Agent uses persistent_comment=true so there's typically one comment that gets edited in place.
          LATEST_BODY=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments"             --jq '[.[] | select(.user.login == "github-actions[bot]") | .body] | last // ""')

          # Extract the score. PR-Agent's reviewer guide format is:
          #   <strong>Score</strong>: 92
          # or in plain markdown:
          #   **Score**: 92
          SCORE=$(echo "$LATEST_BODY" | grep -oE '[Ss]core[^0-9]{0,10}[0-9]+' | grep -oE '[0-9]+' | head -1)
          if [[ -z "$SCORE" ]]; then
            echo "No score found in latest PR-Agent comment -- skipping label."
            exit 0
          fi
          echo "Extracted PR-Agent score: $SCORE"

          # Remove any existing score-* labels (clean slate before adding the new one).
          for L in 'score-90+' 'score-80-89' 'score-70-79' 'score-below-70'; do
            gh issue edit "$PR_NUM" --remove-label "$L" --repo "${{ github.repository }}" 2>/dev/null || true
          done

          # Apply the matching bracket.
          if (( SCORE >= 90 )); then
            BRACKET='score-90+'
          elif (( SCORE >= 80 )); then
            BRACKET='score-80-89'
          elif (( SCORE >= 70 )); then
            BRACKET='score-70-79'
          else
            BRACKET='score-below-70'
          fi
          gh issue edit "$PR_NUM" --add-label "$BRACKET" --repo "${{ github.repository }}"
          echo "Applied label: $BRACKET"

      - name: Inject score banner into PR description
        # Edits the PR body to insert a one-line banner inside an
        # <!-- argos-status:start --> ... <!-- argos-status:end --> block at the
        # very top, preserving the rest of the body. The banner is updated on
        # every review (block stripped + reinjected). Top-of-page visibility
        # for the score / bracket / model / timestamp -- complementary to the
        # bracket label (which appears in the PR header).
        if: always() && (steps.review-default.outcome == 'success' || steps.review-highstakes.outcome == 'success')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
          if [[ -z "$PR_NUM" || "$PR_NUM" == "null" ]]; then
            echo "No PR number -- skipping banner"
            exit 0
          fi

          # Re-fetch the latest PR-Agent comment + extract score (same logic as label step).
          LATEST_BODY=$(gh api "repos/${{ github.repository }}/issues/$PR_NUM/comments"             --jq '[.[] | select(.user.login == "github-actions[bot]") | .body] | last // ""')
          SCORE=$(echo "$LATEST_BODY" | grep -oE '[Ss]core[^0-9]{0,10}[0-9]+' | grep -oE '[0-9]+' | head -1)
          if [[ -z "$SCORE" ]]; then
            echo "No score found -- skipping banner"
            exit 0
          fi

          # Choose bracket + emoji
          if (( SCORE >= 90 )); then
            BRACKET='score-90+'
            EMOJI='🟢'
          elif (( SCORE >= 80 )); then
            BRACKET='score-80-89'
            EMOJI='🟡'
          elif (( SCORE >= 70 )); then
            BRACKET='score-70-79'
            EMOJI='🟠'
          else
            BRACKET='score-below-70'
            EMOJI='🔴'
          fi

          # Which model ran
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'high-stakes') }}" == "true" ]]; then
            MODEL='claude-opus-4.6'
          else
            MODEL='kimi-k2.5'
          fi

          NOW_UTC=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Pull the current PR body to a file (avoids shell-quoting hell on bodies
          # containing $-references or backticks).
          gh pr view "$PR_NUM" --json body --jq .body --repo "${{ github.repository }}" > /tmp/pr-body-current.md

          # Strip any prior argos-status block (idempotent — runs cleanly on every review).
          sed -i.bak '/<!-- argos-status:start -->/,/<!-- argos-status:end -->/d' /tmp/pr-body-current.md
          rm -f /tmp/pr-body-current.md.bak

          # Compose new banner. Note: this is a comment-bounded HTML block, not a
          # markdown blockquote, so it survives gh-edit cleanly.
          cat > /tmp/pr-body-banner.md <<EOFBANNER
          <!-- argos-status:start -->
          > ${EMOJI} **PR-Agent Score: ${SCORE}** \`${BRACKET}\` · model: \`${MODEL}\` · reviewed: ${NOW_UTC}
          <!-- argos-status:end -->

          EOFBANNER

          # Strip the heredoc indentation (leading 10 spaces).
          sed -i.bak 's/^          //' /tmp/pr-body-banner.md
          rm -f /tmp/pr-body-banner.md.bak

          # Concatenate banner + (stripped) original body.
          cat /tmp/pr-body-banner.md /tmp/pr-body-current.md > /tmp/pr-body-new.md

          gh pr edit "$PR_NUM" --body-file /tmp/pr-body-new.md --repo "${{ github.repository }}"
          echo "PR description updated with status banner (score $SCORE)"

      - name: Stamp review with model attribution
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
          if [[ -z "$PR_NUM" || "$PR_NUM" == "null" ]]; then
            echo "No PR number — skipping stamp"
            exit 0
          fi

          # Determine which model ran
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'high-stakes') }}" == "true" ]]; then
            MODEL="openrouter/anthropic/claude-opus-4.6"
          else
            MODEL="openrouter/moonshotai/kimi-k2.5"
          fi

          # Team-local timezone (auto-switches PDT↔PST) plus UTC for
          # unambiguous machine-readable timestamps. Matches the format used
          # by the local Argos review footer in pr-review.sh.
          NOW_TEAM=$(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M %Z')
          NOW_UTC=$(date -u '+%Y-%m-%d %H:%M UTC')

          gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
            --body "> 🤖 **Reviewer:** PR-Agent · **Model:** \`${MODEL}\` · **Completed:** ${NOW_TEAM} · ${NOW_UTC}"


# Argos local review (claude -p) is intentionally NOT automated in CI.
#
# Reason: the GitHub Actions LaunchAgent can't access macOS Keychain, so OAuth
# tokens don't work. The only alternative is ANTHROPIC_API_KEY, which would
# charge inference costs on every PR push.
#
# Run manually from a terminal (where OAuth works, no API key needed):
#
#   cd /Users/andreangelantoni/Projects/ctrfhub
#   .antigravity/scripts/pr-review.sh <PR-number>          # stdout only
#   .antigravity/scripts/pr-review.sh <PR-number> --post  # post to PR
