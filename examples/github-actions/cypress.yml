# Reference GitHub Actions workflow for Cypress + CTRFHub.
# Adapt to your own repository — set CTRFHUB_INGEST_URL and add
# CTRFHUB_API_TOKEN as a repository secret.

name: Cypress Tests → CTRFHub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - uses: cypress-io/github-action@v6
        with:
          browser: chromium
        env:
          CTRFHUB_INGEST_URL: ${{ vars.CTRFHUB_INGEST_URL }}
          CTRFHUB_API_TOKEN: ${{ secrets.CTRFHUB_API_TOKEN }}
          CTRFHUB_PROJECT_SLUG: my-project
