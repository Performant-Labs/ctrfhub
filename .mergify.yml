# Mergify configuration for CTRFHub
#
# Auto-merge triggers (either suffices):
#   - `score-90+` label: applied automatically by the pr-review.yml workflow
#     when PR-Agent scores the PR at 90+. This is the "PR-Agent gave it a thumbs up,
#     CI is green, ship it" path -- removes the manual click-merge for high-confidence
#     PRs. The maintainer never has to look at the PR if score and CI both pass.
#   - `automerge` label: manual override -- applied by the maintainer when they've
#     reviewed a sub-90 PR and want to merge anyway, OR when the score-* labels
#     don't apply (e.g., a PR opened before pr-review.yml was reading scores).
#
# Required checks for the queue (same for both triggers):
#   - Lint & Typecheck (always runs).
#   - Unit Tests + Integration Tests: must be either green or skipped (config-only
#     PRs skip them per the paths-filter introduced in PR #45).
#   - E2E (Playwright) is NOT required yet -- silently broken pre-#50; revisit
#     once a few green-on-real-app runs land.
#
# Workflow with both signals together:
#   - Open PR -> CI runs -> PR-Agent reviews -> if score >= 90, label auto-applied
#     -> Mergify queues -> CI green -> auto-merged. Maintainer touches the PR only
#     when score < 90 (i.e., when there's something to look at).
#
# Squash-merge by default; PRs are typically small and squash keeps main clean.
#
# To extend later:
#   - Add `check-success-or-neutral=E2E Tests (Playwright)` once E2E is reliably
#     green (post-#50).
#   - Auto-label Renovate / Dependabot bot PRs with `automerge` for patch deps.
#   - Tighten score gate to 95+ if 90+ proves too permissive (or relax to 85+
#     if too restrictive).
#
# Docs: https://docs.mergify.com/configuration/

queue_rules:
  - name: default
    queue_conditions:
      - check-success=Lint & Typecheck
      - or:
          - check-success=Unit Tests
          - check-skipped=Unit Tests
      - or:
          - check-success=Integration Tests
          - check-skipped=Integration Tests
    merge_method: squash

pull_request_rules:
  - name: auto-merge when labeled (or score-90+) and CI is green
    conditions:
      # Either trigger label accepts the PR for auto-merge.
      - or:
          - label=automerge        # manual override by maintainer
          - label=score-90+         # PR-Agent gave it a 90-100 score
      - "#changes-requested-reviews-by=0"
      - check-success=Lint & Typecheck
      - or:
          - check-success=Unit Tests
          - check-skipped=Unit Tests
      - or:
          - check-success=Integration Tests
          - check-skipped=Integration Tests
    actions:
      queue:
        name: default

  - name: remove automerge label after merge
    conditions:
      - merged
      - label=automerge
    actions:
      label:
        remove:
          - automerge

  - name: warn if a merge-trigger label is applied but checks failed
    conditions:
      - or:
          - label=automerge
          - label=score-90+
      - check-failure=Lint & Typecheck
    actions:
      comment:
        message: |
          A merge-trigger label (`automerge` or `score-90+`) is applied but
          Lint & Typecheck is failing. Mergify will not merge this PR until
          checks pass. Either resolve the failure or remove the label.
